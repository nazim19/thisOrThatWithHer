services:
  - type: web
    name: this-or-that-with-her
    env: static
    buildCommand: npm install && node ./node_modules/react-scripts/bin/react-scripts.js build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: CI
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
